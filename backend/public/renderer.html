<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    #root {
      position: fixed; left: 50%; top: 50%;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      transform: translate(-50%, -50%);
      overflow: hidden;
    }
    #hud {
      position: fixed; top: 8px; right: 8px; z-index: 9999;
      display: flex; gap: 6px; align-items: center; pointer-events: none;
      font-family: monospace; font-size: 11px;
    }
    #fps-overlay {
      position: absolute; top: 8px; right: 8px; z-index: 10000;
      display: none; pointer-events: none;
      font-family: monospace; font-size: 18px; font-weight: 700;
      color: #fff; text-shadow: 0 1px 3px #000, 0 0 6px #000;
    }
    body.decklink-blit { background: transparent; overflow: hidden; }
    body.decklink-blit #root {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%;
      transform: none;
    }
    .badge { padding: 2px 8px; border-radius: 4px; color: #fff; }
  </style>
</head>
<body>
  <div id="root">
    <div id="fps-overlay">FPS=0</div>
  </div>
  <div id="hud">
    <span id="ws-badge" class="badge" style="background:#dc2626">✕ WS</span>
    <span id="air-badge" class="badge" style="background:#dc2626;display:none"></span>
  </div>
  <script src="/pixi.min.js"></script>
  <script src="/gsap.min.js"></script>
  <script src="/timeline-runtime.js"></script>
  <script>
  const root = document.getElementById('root');
  const fpsOverlay = document.getElementById('fps-overlay');
  const hud = document.getElementById('hud');
  const wsBadge = document.getElementById('ws-badge');
  const airBadge = document.getElementById('air-badge');
  const CHANNEL_ID = new URLSearchParams(location.search).get('channel') || '';
  const FORCE_CANVAS = new URLSearchParams(location.search).get('forceCanvas') === '1';
  const DECKLINK_IPC = new URLSearchParams(location.search).get('decklinkIpc') === '1';
  const DECKLINK_BLIT = new URLSearchParams(location.search).get('decklinkBlit') === '1';

  // ── Font loading ──────────────────────────────────────────────────────────
  const SYSTEM_FONTS = new Set(['Arial','Helvetica','Verdana','Trebuchet MS','Georgia','Times New Roman','Courier New','sans-serif','serif','monospace']);
  const loadedFonts = new Set();

  function ensureFonts(template) {
    const families = [...new Set(
      (template.layers || []).filter(l => l.type === 'text').map(l => l.style && l.style.fontFamily).filter(Boolean)
    )].filter(f => !SYSTEM_FONTS.has(f) && !loadedFonts.has(f));
    if (!families.length) return Promise.resolve(false);
    families.forEach(family => {
      loadedFonts.add(family);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;700&display=swap`;
      document.head.appendChild(link);
    });
    return Promise.all(families.map(f => document.fonts.load(`bold 16px "${f}"`).catch(() => {}))).then(() => true);
  }

  // templateId -> { container, layerContainer, bgGraphics, template, clockTimer, videoMap }
  // (or isDom: true path for fallback)
  const active = new Map();

  // ── Single shared PIXI Application (one WebGL context for all templates) ────
  // Avoids the 16-context browser limit that causes "Too many active WebGL
  // contexts" errors and white-frame flashes when running many video clips.
  let sharedApp    = null;   // PIXI.Application — created once on first TAKE
  let sharedCanvas = null;   // the single <canvas> element
  let sharedAppFailed = false; // true → all templates fall back to DOM renderer
  let channelSettings = { display_mode: 'HD1080i50', show_fps: false };

  // Linux DeckLink: blit WebGL → 2D canvas so offscreen paint can capture at full fps.
  let blitCanvas = null;
  let blitCtx = null;

  function setupDecklinkBlitCanvas(w, h) {
    if (!DECKLINK_BLIT) return;
    if (!blitCanvas) {
      blitCanvas = document.createElement('canvas');
      blitCanvas.id = 'decklink-blit';
      blitCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;';
      root.appendChild(blitCanvas);
      blitCtx = blitCanvas.getContext('2d', { alpha: true, desynchronized: true });
      document.body.classList.add('decklink-blit');
      hud.style.display = 'none';
      fpsOverlay.style.display = 'none';
      console.log('[Renderer] DeckLink Canvas2D blit enabled');
    }
    blitCanvas.width = w;
    blitCanvas.height = h;
  }

  function hookDecklinkBlit(app) {
    if (!DECKLINK_BLIT || !blitCtx || app._decklinkBlitHooked) return;
    app._decklinkBlitHooked = true;
    app.ticker.maxFPS = decklinkTargetFps;
    app.ticker.add(() => {
      if (!sharedCanvas || !blitCtx) return;
      const w = app.renderer.width;
      const h = app.renderer.height;
      blitCtx.globalCompositeOperation = 'copy';
      blitCtx.drawImage(sharedCanvas, 0, 0, w, h);
    });
  }

  function pixiInitOptions(w, h) {
    const base = {
      view: sharedCanvas, width: w, height: h,
      backgroundAlpha: 0, resolution: 1,
    };
    if (DECKLINK_BLIT || DECKLINK_IPC) {
      base.preserveDrawingBuffer = true;
    }
    return base;
  }

  // Linux DeckLink: async PBO readPixels → IPC (conversion in native addon).
  function createGpuFrameReader(gl, w, h) {
    const pbos = [gl.createBuffer(), gl.createBuffer()];
    const rgba = new Uint8Array(w * h * 4);
    for (const pbo of pbos) {
      gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pbo);
      gl.bufferData(gl.PIXEL_PACK_BUFFER, rgba.byteLength, gl.STREAM_READ);
    }
    gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
    let index = 0;
    let primed = false;

    return {
      w, h,
      capture() {
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);

        gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pbos[index]);
        gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, 0);

        const readFrom = (index + 1) % 2;
        index = readFrom;

        gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pbos[readFrom]);
        if (!primed) {
          primed = true;
          gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
          return null;
        }
        gl.getBufferSubData(gl.PIXEL_PACK_BUFFER, 0, rgba);
        gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
        return rgba;
      },
    };
  }

  let gpuReader = null;
  let decklinkLoopStarted = false;
  let decklinkTargetFps = 50;

  function startDecklinkFrameLoop() {
    if (decklinkLoopStarted || !window.decklinkOut || !DECKLINK_IPC) return;
    decklinkLoopStarted = true;
    console.log('[Renderer] DeckLink PBO frame loop started');

    let lastSend = 0;

    function tick(now) {
      if (sharedApp && sharedApp.renderer && sharedApp.renderer.gl) {
        const minInterval = 1000 / decklinkTargetFps;
        const r = sharedApp.renderer;
        if (!gpuReader || gpuReader.w !== r.width || gpuReader.h !== r.height) {
          gpuReader = createGpuFrameReader(r.gl, r.width, r.height);
        }
        const pixels = gpuReader.capture();
        if (pixels && now - lastSend >= minInterval) {
          lastSend = now;
          window.decklinkOut.sendFrameRgba(pixels);
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  if (window.decklinkOut && DECKLINK_IPC) startDecklinkFrameLoop();

  function resolveRenderFormat(displayMode) {
    let fps = 25;
    if (displayMode) {
      if (displayMode.includes('p50') || displayMode.includes('i50')) fps = 50;
      else if (displayMode.includes('5994') || displayMode.includes('p5994')) fps = 60;
      else if (displayMode.includes('p6000') || displayMode.includes('i6000') || displayMode.includes('p60')) fps = 60;
      else if (displayMode.includes('p2997') || displayMode.includes('i5994')) fps = 30;
      else if (displayMode.includes('p30')) fps = 30;
      else if (displayMode.includes('p25')) fps = 25;
      else if (displayMode.includes('p2398') || displayMode.includes('p24')) fps = 24;
    }
    return {
      width: displayMode && displayMode.startsWith('HD720') ? 1280 : 1920,
      height: displayMode && displayMode.startsWith('HD720') ? 720 : 1080,
      fps,
    };
  }

  function currentRenderFormat() {
    return resolveRenderFormat(channelSettings.display_mode);
  }

  function applyRenderFormat() {
    const format = currentRenderFormat();
    if (DECKLINK_BLIT) {
      setupDecklinkBlitCanvas(format.width, format.height);
    } else {
      root.style.aspectRatio = `${format.width} / ${format.height}`;
    }
    if (sharedApp) sharedApp.renderer.resize(format.width, format.height);
  }

  function getSharedApp(w, h) {
    if (sharedAppFailed) return null;
    if (sharedApp) {
      sharedApp.renderer.resize(w, h);
      return sharedApp;
    }

    sharedCanvas = document.createElement('canvas');
    sharedCanvas.style.cssText = DECKLINK_BLIT
      ? 'position:absolute;top:0;left:0;visibility:hidden;pointer-events:none;'
      : 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
    root.appendChild(sharedCanvas);
    if (DECKLINK_BLIT) setupDecklinkBlitCanvas(w, h);

    try {
      if (FORCE_CANVAS) {
        sharedApp = new PIXI.Application({
          ...pixiInitOptions(w, h),
          forceCanvas: true,
        });
      } else {
        sharedApp = new PIXI.Application({
          ...pixiInitOptions(w, h),
          antialias: !DECKLINK_BLIT,
        });
      }
      const rendererType = sharedApp.renderer.type === 2 ? 'Canvas2D' : 'WebGL';
      const gl = sharedApp.renderer.gl;
      const gpuInfo = gl ? (gl.getParameter(gl.VERSION) + ' / ' + gl.getParameter(gl.RENDERER)) : 'n/a';
      console.log(`[Renderer] PIXI init OK — ${rendererType}${FORCE_CANVAS ? ' (forced)' : ''} — ${gpuInfo}`);
      window._dbg(`PIXI: ${rendererType} — ${gpuInfo}`);
      hookDecklinkBlit(sharedApp);
      startDecklinkFrameLoop();
    } catch (e) {
      window._dbg('PIXI WebGL failed, trying Canvas2D: ' + e.message);
      try {
        sharedApp = new PIXI.Application({
          ...pixiInitOptions(w, h),
          forceCanvas: true,
        });
        console.log('[Renderer] PIXI init OK — Canvas2D fallback');
        window._dbg('PIXI: Canvas2D fallback');
      } catch (e2) {
        sharedCanvas.remove(); sharedCanvas = null;
        sharedAppFailed = true;
        console.warn('[Renderer] PIXI failed, using DOM renderer for all templates:', e2);
        window._dbg('PIXI FAILED — DOM renderer');
      }
    }
    return sharedApp;
  }

  // ── Clock formatting ──────────────────────────────────────────────────────

  function formatClockValue(layer) {
    const now = Math.floor(Date.now() / 1000);
    let total;
    if (layer.mode === 'clock') {
      const d = new Date();
      total = d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
    } else if (layer.mode === 'countup') {
      total = Math.max(0, now - (layer.startTime ?? now));
    } else {
      total = Math.max(0, (layer.targetTime ?? now) - now);
    }
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    return (layer.format || 'HH:mm:ss')
      .replace('HH', String(h).padStart(2, '0'))
      .replace('mm', String(m).padStart(2, '0'))
      .replace('ss', String(s).padStart(2, '0'));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function resolveValue(value, vars, fallback) {
    if (!value && value !== 0) return fallback;
    if (typeof value === 'string') return value;
    if (value && value.type === 'variable') return vars[value.variableId] ?? fallback;
    return fallback;
  }

  function hexColor(str) {
    if (!str || str === 'transparent') return 0x000000;
    return parseInt(str.replace('#', ''), 16);
  }

  // ── Video fit ─────────────────────────────────────────────────────────────

  function applyVideoFit(sprite, layer, entry) {
    const t = layer.transform;
    const scaleX = t.scaleX == null ? 1 : t.scaleX;
    const scaleY = t.scaleY == null ? 1 : t.scaleY;
    const fit = layer.fit || 'stretch';
    const vid = (entry.videoMap || new Map()).get(layer.id)?.el;
    const nw = vid ? vid.videoWidth : 0;
    const nh = vid ? vid.videoHeight : 0;
    const loaded = nw > 0 && nh > 0;

    if (!loaded || fit === 'stretch') {
      sprite.x = t.x; sprite.y = t.y;
      sprite.width = t.width * scaleX; sprite.height = t.height * scaleY;
      return;
    }

    const scale = fit === 'contain'
      ? Math.min(t.width / nw, t.height / nh)
      : Math.max(t.width / nw, t.height / nh);
    const sw = nw * scale, sh = nh * scale;
    sprite.x = t.x + (t.width - sw) / 2;
    sprite.y = t.y + (t.height - sh) / 2;
    sprite.width = sw * scaleX; sprite.height = sh * scaleY;
  }

  // ── Image fit ────────────────────────────────────────────────────────────

  function applyImageFit(sprite, layer, t) {
    const scaleX = t.scaleX == null ? 1 : t.scaleX;
    const scaleY = t.scaleY == null ? 1 : t.scaleY;
    const fit = layer.fit || 'stretch';
    const tex = sprite.texture;
    const loaded = tex && tex !== PIXI.Texture.EMPTY && tex.valid && tex.orig && tex.orig.width > 0;

    if (!loaded || fit === 'stretch') {
      sprite.x = t.x; sprite.y = t.y;
      sprite.width = t.width * scaleX; sprite.height = t.height * scaleY;
      return;
    }

    const nw = tex.orig.width, nh = tex.orig.height;
    const scale = fit === 'contain'
      ? Math.min(t.width / nw, t.height / nh)
      : Math.max(t.width / nw, t.height / nh);
    const sw = nw * scale, sh = nh * scale;
    sprite.x = t.x + (t.width - sw) / 2;
    sprite.y = t.y + (t.height - sh) / 2;
    sprite.width = sw * scaleX; sprite.height = sh * scaleY;
  }

  // ── Layer rendering ───────────────────────────────────────────────────────

  function createObj(layer) {
    switch (layer.type) {
      case 'text':
      case 'clock':  return new PIXI.Text('');
      case 'image':
      case 'video':  return new PIXI.Sprite();
      case 'rect':   return new PIXI.Graphics();
      default:       return new PIXI.Container();
    }
  }

  function applyLayer(obj, layer, vars, entry) {
    const t = layer.transform;
    const scaleX = t.scaleX == null ? 1 : t.scaleX;
    const scaleY = t.scaleY == null ? 1 : t.scaleY;
    obj.x = t.x;
    obj.y = t.y;
    obj.rotation = (t.rotation * Math.PI) / 180;
    obj.alpha = layer.visible ? layer.opacity : 0;

    const bmKey = (layer.blendMode || 'normal').toUpperCase();
    obj.blendMode = PIXI.BLEND_MODES[bmKey] ?? PIXI.BLEND_MODES.NORMAL;

    if (layer.type === 'text' || layer.type === 'clock') {
      const fill = resolveValue(layer.style.fill, vars, '#ffffff');
      obj.text = layer.type === 'clock'
        ? formatClockValue(layer)
        : resolveValue(layer.content, vars, '');
      obj.style = new PIXI.TextStyle({
        fontFamily:        layer.style.fontFamily || 'Arial',
        fontSize:          layer.style.fontSize   || 48,
        fontWeight:        layer.style.fontWeight || 'bold',
        fill,
        align:             layer.style.align,
        lineHeight:        layer.style.lineHeight,
        letterSpacing:     layer.style.letterSpacing,
        stroke:            layer.style.strokeColor,
        strokeThickness:   layer.style.strokeWidth,
        dropShadow:        layer.style.dropShadow,
        dropShadowBlur:    layer.style.dropShadowBlur,
        dropShadowColor:   layer.style.dropShadowColor,
        dropShadowDistance:layer.style.dropShadowDistance,
        wordWrap:          true,
        wordWrapWidth:     t.width,
      });
      obj.scale.set(scaleX, scaleY);
    }

    if (layer.type === 'rect') {
      const fill = resolveValue(layer.fill, vars, '#3a3a3a');
      obj.clear();
      if (layer.borderWidth > 0)
        obj.lineStyle(layer.borderWidth, hexColor(layer.borderColor), 1);
      obj.beginFill(hexColor(fill));
      if (layer.cornerRadius > 0)
        obj.drawRoundedRect(0, 0, t.width, t.height, layer.cornerRadius);
      else
        obj.drawRect(0, 0, t.width, t.height);
      obj.endFill();
      obj.scale.set(scaleX, scaleY);
    }

    if (layer.type === 'image') {
      const src = resolveValue(layer.src, vars, '');
      const cached = obj.texture && obj.texture.textureCacheIds && obj.texture.textureCacheIds[0];
      if (src && cached !== src) {
        PIXI.Texture.fromURL(src).then(tex => {
          obj.texture = tex;
          applyImageFit(obj, layer, t);
        }).catch(err => console.warn('Image load failed:', src, err));
      }
      applyImageFit(obj, layer, t);
    }

    if (layer.type === 'video' && entry) {
      const src = resolveValue(layer.src, vars, '');
      if (src) {
        const existing = entry.videoMap.get(layer.id);
        if (!existing || existing.src !== src) {
          if (existing) { existing.el.pause(); existing.el.src = ''; }
          const el = document.createElement('video');
          el.src = src;
          el.loop = layer.loop !== false;
          el.muted = true;
          el.autoplay = true;
          el.playsInline = true;
          el.crossOrigin = 'anonymous';
          el.play().catch(() => {});
          entry.videoMap.set(layer.id, { el, src });
          obj.texture = PIXI.Texture.from(el);
        } else {
          existing.el.loop = layer.loop !== false;
        }
      } else {
        obj.texture = PIXI.Texture.EMPTY;
      }
      applyVideoFit(obj, layer, entry);
    }
  }

  // ── Template sync ─────────────────────────────────────────────────────────

  function syncTemplate(entry, vars, frame = 0) {
    ensureFonts(entry.template).then(loaded => { if (loaded) syncTemplate(entry, vars, frame); });
    const { layerContainer, bgGraphics, layerMap, template } = entry;

    // Background handled via a Graphics child (shared renderer has transparent bg)
    bgGraphics.clear();
    const bg = template.canvas.background;
    if (bg && bg !== 'transparent') {
      bgGraphics.beginFill(hexColor(bg));
      bgGraphics.drawRect(0, 0, template.canvas.width, template.canvas.height);
      bgGraphics.endFill();
    }

    const existingIds = new Set(layerMap.keys());
    const prepared = TimelineRuntime.prepareTemplateForRender(template, frame);
    const reversed = [...prepared.layers].reverse();

    reversed.forEach((layer, index) => {
      existingIds.delete(layer.id);
      let obj = layerMap.get(layer.id);
      if (!obj || obj.name !== layer.type) {
        if (obj) { layerContainer.removeChild(obj); obj.destroy(); }
        obj = createObj(layer);
        obj.name = layer.type;
        layerMap.set(layer.id, obj);
        layerContainer.addChildAt(obj, index);
      }
      applyLayer(obj, layer, vars || {}, entry);
      layerContainer.setChildIndex(obj, index);
    });
    entry._renderTemplate = prepared;

    existingIds.forEach(id => {
      const obj = layerMap.get(id);
      if (obj) { layerContainer.removeChild(obj); obj.destroy(); }
      layerMap.delete(id);
      const vid = entry.videoMap && entry.videoMap.get(id);
      if (vid) { vid.el.pause(); vid.el.src = ''; entry.videoMap.delete(id); }
    });
  }

  function playTimeline(entry, vars, onComplete) {
    const timeline = TimelineRuntime.normalizeTimeline(entry.template.timeline);
    if (!TimelineRuntime.hasAnyTimelineKeys(timeline)) {
      onComplete?.();
      return;
    }
    if (entry.timelineTween) entry.timelineTween.kill();
    const fps = timeline.fps;
    const maxFrame = Math.max(0, timeline.durationFrames);
    const infinitePlayback = timeline.playbackMode === 'infinite';
    const proxy = { frame: 0 };
    let playbackState = TimelineRuntime.createTimelinePlaybackState(timeline.directors);
    let previousFrame = 0;
    entry.timelineTween = gsap.to(proxy, {
      frame: maxFrame,
      duration: maxFrame / fps,
      repeat: infinitePlayback ? -1 : 0,
      ease: 'none',
      onUpdate: () => {
        const frame = Math.round(proxy.frame);
        const result = TimelineRuntime.stepTimelinePlayback(timeline, previousFrame, frame, playbackState);
        playbackState = result.state;
        entry.timelineFrame = frame;
        previousFrame = frame;
        syncTemplate(entry, vars, playbackState.directorPlayheads);
      },
      onRepeat: () => {
        if (!infinitePlayback) return;
        playbackState = TimelineRuntime.createTimelinePlaybackState(timeline.directors);
        previousFrame = 0;
        entry.timelineFrame = 0;
        proxy.frame = 0;
      },
      onComplete: () => {
        entry.timelineTween = null;
        onComplete?.();
      },
    });
  }

  function domPlayTimeline(entry, vars, onComplete) {
    const timeline = TimelineRuntime.normalizeTimeline(entry.template.timeline);
    if (!TimelineRuntime.hasAnyTimelineKeys(timeline)) {
      onComplete?.();
      return;
    }
    if (entry.timelineTween) entry.timelineTween.kill();
    const fps = timeline.fps;
    const maxFrame = Math.max(0, timeline.durationFrames);
    const infinitePlayback = timeline.playbackMode === 'infinite';
    const proxy = { frame: 0 };
    let playbackState = TimelineRuntime.createTimelinePlaybackState(timeline.directors);
    let previousFrame = 0;
    entry.timelineTween = gsap.to(proxy, {
      frame: maxFrame,
      duration: maxFrame / fps,
      repeat: infinitePlayback ? -1 : 0,
      ease: 'none',
      onUpdate: () => {
        const frame = Math.round(proxy.frame);
        const result = TimelineRuntime.stepTimelinePlayback(timeline, previousFrame, frame, playbackState);
        playbackState = result.state;
        entry.timelineFrame = frame;
        previousFrame = frame;
        domSyncTemplate(entry, vars, playbackState.directorPlayheads);
      },
      onRepeat: () => {
        if (!infinitePlayback) return;
        playbackState = TimelineRuntime.createTimelinePlaybackState(timeline.directors);
        previousFrame = 0;
        entry.timelineFrame = 0;
        proxy.frame = 0;
      },
      onComplete: () => {
        entry.timelineTween = null;
        onComplete?.();
      },
    });
  }

  // ── DOM Renderer (fallback when WebGL/Canvas unavailable) ────────────────

  function domApplyLayer(el, layer, vars) {
    const t = layer.transform;
    el.style.position     = 'absolute';
    el.style.left         = t.x + 'px';
    el.style.top          = t.y + 'px';
    el.style.width        = t.width + 'px';
    el.style.height       = t.height + 'px';
    el.style.opacity      = layer.visible ? (layer.opacity != null ? layer.opacity : 1) : 0;
    el.style.transform    = `rotate(${t.rotation || 0}deg) scale(${t.scaleX == null ? 1 : t.scaleX}, ${t.scaleY == null ? 1 : t.scaleY})`;
    el.style.transformOrigin = '0 0';
    el.style.overflow     = 'hidden';
    el.style.boxSizing    = 'border-box';

    if (layer.type === 'text' || layer.type === 'clock') {
      const fill = resolveValue(layer.style.fill, vars, '#ffffff');
      const text = layer.type === 'clock'
        ? formatClockValue(layer)
        : resolveValue(layer.content, vars, '');
      el.textContent = text;
      const s = layer.style || {};
      el.style.color         = fill;
      el.style.fontFamily    = s.fontFamily || 'Arial';
      el.style.fontSize      = (s.fontSize || 48) + 'px';
      el.style.fontWeight    = s.fontWeight || 'bold';
      el.style.lineHeight    = s.lineHeight ? s.lineHeight + 'px' : 'normal';
      el.style.letterSpacing = s.letterSpacing ? s.letterSpacing + 'px' : 'normal';
      el.style.textAlign     = s.align || 'left';
      el.style.whiteSpace    = 'pre-wrap';
      el.style.wordBreak     = 'break-word';
      if (s.dropShadow) {
        const dist = s.dropShadowDistance || 2;
        el.style.textShadow = `${dist}px ${dist}px ${s.dropShadowBlur || 4}px ${s.dropShadowColor || 'rgba(0,0,0,0.8)'}`;
      } else {
        el.style.textShadow = '';
      }
      if (s.strokeWidth > 0) {
        el.style.webkitTextStroke = `${s.strokeWidth}px ${s.strokeColor || '#000'}`;
      } else {
        el.style.webkitTextStroke = '';
      }
    }

    if (layer.type === 'rect') {
      const fill = resolveValue(layer.fill, vars, '#3a3a3a');
      el.style.background   = fill === 'transparent' ? 'transparent' : fill;
      el.style.borderRadius = (layer.cornerRadius || 0) + 'px';
      if (layer.borderWidth > 0) {
        el.style.border = `${layer.borderWidth}px solid ${layer.borderColor || '#000000'}`;
      } else {
        el.style.border = 'none';
      }
    }

    if (layer.type === 'image') {
      const src = resolveValue(layer.src, vars, '');
      let img = el.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
        el.appendChild(img);
      }
      if (src && img.getAttribute('data-src') !== src) {
        img.setAttribute('data-src', src);
        img.src = src;
      }
      const fit = layer.fit || 'stretch';
      img.style.objectFit = fit === 'stretch' ? 'fill' : fit;
    }

    if (layer.type === 'video') {
      const src = resolveValue(layer.src, vars, '');
      let vid = el.querySelector('video');
      if (!vid) {
        vid = document.createElement('video');
        vid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
        vid.muted = true; vid.autoplay = true; vid.playsInline = true;
        el.appendChild(vid);
      }
      const fit = layer.fit || 'stretch';
      vid.style.objectFit = fit === 'stretch' ? 'fill' : fit;
      if (src && vid.getAttribute('data-src') !== src) {
        vid.setAttribute('data-src', src);
        vid.src = src;
        vid.loop = layer.loop !== false;
        vid.play().catch(() => {});
      } else if (vid.getAttribute('data-src')) {
        vid.loop = layer.loop !== false;
      }
    }
  }

  function domSyncTemplate(entry, vars, frame = 0) {
    ensureFonts(entry.template).then(loaded => { if (loaded) domSyncTemplate(entry, vars, frame); });
    const { domRoot, template, layerEls } = entry;
    const bg = template.canvas.background;
    domRoot.style.background = (!bg || bg === 'transparent') ? 'transparent' : bg;

    const existingIds = new Set(layerEls.keys());
    const prepared = TimelineRuntime.prepareTemplateForRender(template, frame);

    prepared.layers.forEach((layer, index) => {
      existingIds.delete(layer.id);
      let item = layerEls.get(layer.id);
      if (!item || item.type !== layer.type) {
        if (item) item.el.remove();
        const el = document.createElement('div');
        domRoot.appendChild(el);
        item = { el, type: layer.type };
        layerEls.set(layer.id, item);
      }
      item.el.style.zIndex = index;
      domApplyLayer(item.el, layer, vars || {});
    });

    existingIds.forEach(id => {
      const item = layerEls.get(id);
      if (item) item.el.remove();
      layerEls.delete(id);
    });
  }

  function domStartClockTicker(entry) {
    if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
    const clockLayers = (entry.template.layers || []).filter(l => l.type === 'clock');
    if (!clockLayers.length) return;
    entry.clockTimer = setInterval(() => {
      clockLayers.forEach(layer => {
        const item = entry.layerEls.get(layer.id);
        if (item) item.el.textContent = formatClockValue(layer);
      });
    }, 1000);
  }

  // ── Clock ticker ─────────────────────────────────────────────────────────

  function startClockTicker(entry) {
    if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
    const clockLayers = (entry.template.layers || []).filter(l => l.type === 'clock');
    if (!clockLayers.length) return;
    entry.clockTimer = setInterval(() => {
      clockLayers.forEach(layer => {
        const obj = entry.layerMap.get(layer.id);
        if (obj) obj.text = formatClockValue(layer);
      });
    }, 1000);
  }

  // ── Commands ──────────────────────────────────────────────────────────────

  function handleCommand(cmd) {
    window._dbg(`CMD: ${cmd.type} id=${cmd.templateId}`);

    if (cmd.type === 'take') {
      // Remove existing entry for this templateId (re-take)
      const existing = active.get(cmd.templateId);
      if (existing) {
        if (existing.clockTimer) clearInterval(existing.clockTimer);
        if (existing.timelineTween) { existing.timelineTween.kill(); existing.timelineTween = null; }
        if (existing.isDom) {
          existing.domRoot.remove();
        } else {
          if (existing.videoMap) existing.videoMap.forEach(({ el }) => { el.pause(); el.src = ''; });
          if (existing.container.parent) existing.container.parent.removeChild(existing.container);
          existing.container.destroy({ children: true });
        }
        active.delete(cmd.templateId);
      }

      const format = currentRenderFormat();
      const template = {
        ...cmd.template,
        canvas: { ...cmd.template.canvas, width: format.width, height: format.height },
      };

      // Try to get (or lazily create) the single shared PIXI application
      const app = getSharedApp(format.width, format.height);

      if (!app) {
        // DOM fallback (sharedApp failed to init)
        const domRoot = document.createElement('div');
        domRoot.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;';
        root.appendChild(domRoot);
        const entry = { isDom: true, domRoot, template, layerEls: new Map(), clockTimer: null, timelineTween: null, variables: cmd.variables || {} };
        active.set(cmd.templateId, entry);
        updateHud();
        domSyncTemplate(entry, entry.variables);
        domStartClockTicker(entry);
        if (TimelineRuntime.hasAnyTimelineKeys(template.timeline)) {
          domPlayTimeline(entry, entry.variables);
        }
        window._dbg(`TAKE done (DOM): ${template.name}, layers=${template.layers.length}`);
        return;
      }

      // PIXI path — one Container per template inside the shared Application
      const container    = new PIXI.Container();
      const bgGraphics   = new PIXI.Graphics();   // filled when template has a bg color
      const layerContainer = new PIXI.Container();
      container.addChild(bgGraphics);
      container.addChild(layerContainer);
      app.stage.addChild(container);              // later TAKEs appear on top

      const entry = {
        container, layerContainer, bgGraphics,
        template, layerMap: new Map(), clockTimer: null, videoMap: new Map(),
        timelineTween: null, variables: cmd.variables || {},
      };
      active.set(cmd.templateId, entry);
      updateHud();

      syncTemplate(entry, entry.variables);
      startClockTicker(entry);
      if (TimelineRuntime.hasAnyTimelineKeys(template.timeline)) {
        playTimeline(entry, entry.variables);
      }
      window._dbg(`TAKE done: ${template.name}, layers=${template.layers.length}`);
    }

    if (cmd.type === 'clear') {
      const entry = active.get(cmd.templateId);
      if (!entry) return;
      if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
      if (entry.timelineTween) { entry.timelineTween.kill(); entry.timelineTween = null; }
      active.delete(cmd.templateId);
      updateHud();

      if (entry.isDom) {
        entry.domRoot.remove();
        return;
      }

      // PIXI path — pause videos, then remove Container
      // (do NOT destroy sharedApp — it's shared across all templates)
      if (entry.videoMap) entry.videoMap.forEach(({ el }) => { try { el.pause(); } catch(e) {} });
      if (entry.videoMap) {
        entry.videoMap.forEach(({ el }) => {
          try { el.removeAttribute('src'); el.load(); } catch(e) {}
        });
        entry.videoMap.clear();
      }
      if (entry.container.parent) entry.container.parent.removeChild(entry.container);
      entry.container.destroy({ children: true });
    }

    if (cmd.type === 'update') {
      const entry = active.get(cmd.templateId);
      if (!entry) return;
      entry.variables = cmd.variables || {};
      const frame = entry.timelineFrame ?? 0;
      if (entry.isDom) {
        domSyncTemplate(entry, entry.variables, frame);
        return;
      }
      syncTemplate(entry, entry.variables, frame);
    }
  }

  // ── HUD ───────────────────────────────────────────────────────────────────

  function updateHud() {
    const n = active.size;
    airBadge.style.display = n > 0 ? '' : 'none';
    airBadge.textContent = n + ' ON AIR';
  }

  // ── Optional FPS overlay ──────────────────────────────────────────────────

  let showFpsOverlay = false;
  let fpsFrameCount = 0;
  let fpsLastSample = performance.now();

  function setFpsOverlayVisible(visible) {
    showFpsOverlay = visible;
    fpsOverlay.style.display = visible ? 'block' : 'none';
    hud.style.top = visible ? '34px' : '8px';
  }

  async function refreshChannelSettings() {
    if (!CHANNEL_ID) {
      setFpsOverlayVisible(false);
      return;
    }
    try {
      const r = await fetch(`/api/channels/${encodeURIComponent(CHANNEL_ID)}`, { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const channel = await r.json();
      channelSettings = {
        display_mode: channel.display_mode || 'HD1080i50',
        show_fps: Boolean(channel.show_fps),
      };
      decklinkTargetFps = currentRenderFormat().fps;
      if (sharedApp && sharedApp._decklinkBlitHooked) {
        sharedApp.ticker.maxFPS = decklinkTargetFps;
      }
      applyRenderFormat();
      setFpsOverlayVisible(channelSettings.show_fps);
    } catch (err) {
      console.warn('[Renderer] Failed to load channel settings:', err);
      setFpsOverlayVisible(false);
    }
  }

  function tickFps(now) {
    fpsFrameCount++;
    const dt = now - fpsLastSample;
    if (dt >= 1000) {
      if (showFpsOverlay) {
        const fps = Math.round((fpsFrameCount * 1000) / dt);
        fpsOverlay.textContent = `FPS=${fps}`;
      }
      fpsFrameCount = 0;
      fpsLastSample = now;
    }
    requestAnimationFrame(tickFps);
  }

  requestAnimationFrame(tickFps);

  // ── Debug overlay (add ?debug to URL to enable) ───────────────────────────

  const IS_DEBUG = new URLSearchParams(location.search).has('debug');
  let debugEl = null;
  if (IS_DEBUG) {
    debugEl = document.createElement('div');
    debugEl.style.cssText = 'position:fixed;bottom:8px;left:8px;right:8px;z-index:9999;font-family:monospace;font-size:11px;color:#0f0;text-shadow:0 0 4px #000;pointer-events:none;';
    document.body.appendChild(debugEl);
    const lines = [];
    window._dbg = (msg) => {
      const t = new Date().toISOString().slice(11,23);
      lines.unshift(`[${t}] ${msg}`);
      if (lines.length > 12) lines.pop();
      debugEl.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
    };
    window.onerror = (msg, src, line) => window._dbg(`ERROR: ${msg} (${line})`);
    window._dbg('Debug mode ON — waiting for commands...');
  } else {
    window._dbg = () => {};
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = new URLSearchParams(location.search).get('host') || location.host;
    const chParam = CHANNEL_ID ? `?channel=${encodeURIComponent(CHANNEL_ID)}` : '';
    const url = `${protocol}//${host}/ws/renderer${chParam}`;
    wsBadge.title = url;
    const ws = new WebSocket(url);

    ws.onopen = () => {
      wsBadge.style.background = '#16a34a';
      wsBadge.textContent = CHANNEL_ID ? `⬤ CH:${CHANNEL_ID.slice(0, 6)}` : '⬤ WS';
      window._dbg('WS connected: ' + url);
    };
    ws.onclose = () => {
      wsBadge.style.background = '#dc2626';
      wsBadge.textContent = '✕ WS';
      window._dbg('WS disconnected, retry in 3s');
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      try { handleCommand(JSON.parse(e.data)); } catch(err) { console.error(err); }
    };
  }

  if (DECKLINK_BLIT) setupDecklinkBlitCanvas(1920, 1080);

  const IS_PREVIEW = new URLSearchParams(location.search).has('preview');
  if (IS_PREVIEW) {
    hud.style.display = 'none';
    fpsOverlay.style.display = 'none';
    document.body.style.background = '#0a0a0f';
  } else {
    refreshChannelSettings();
    setInterval(refreshChannelSettings, 5000);
    connect();
  }

  // PostMessage for preview mode (or external control without WS)
  window.addEventListener('message', (e) => {
    if (e.data && typeof e.data === 'object' && e.data.type) {
      try { handleCommand(e.data); } catch (err) { console.error(err); }
    }
  });
  </script>
</body>
