<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    #root { position: fixed; inset: 0; overflow: hidden; }
    #hud {
      position: fixed; top: 8px; right: 8px; z-index: 9999;
      display: flex; gap: 6px; align-items: center; pointer-events: none;
      font-family: monospace; font-size: 11px;
    }
    .badge { padding: 2px 8px; border-radius: 4px; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="hud">
    <span id="ws-badge" class="badge" style="background:#dc2626">✕ WS</span>
    <span id="air-badge" class="badge" style="background:#dc2626;display:none"></span>
  </div>

  <script src="/pixi.min.js"></script>
  <script src="/gsap.min.js"></script>
  <script>
  const root = document.getElementById('root');
  const wsBadge = document.getElementById('ws-badge');
  const airBadge = document.getElementById('air-badge');

  // ── Font loading ──────────────────────────────────────────────────────────
  const SYSTEM_FONTS = new Set(['Arial','Helvetica','Verdana','Trebuchet MS','Georgia','Times New Roman','Courier New','sans-serif','serif','monospace']);
  const loadedFonts = new Set();

  function ensureFonts(template) {
    const families = [...new Set(
      (template.layers || []).filter(l => l.type === 'text').map(l => l.style && l.style.fontFamily).filter(Boolean)
    )].filter(f => !SYSTEM_FONTS.has(f) && !loadedFonts.has(f));
    if (!families.length) return Promise.resolve(false);
    families.forEach(family => {
      loadedFonts.add(family);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;700&display=swap`;
      document.head.appendChild(link);
    });
    return Promise.all(families.map(f => document.fonts.load(`bold 16px "${f}"`).catch(() => {}))).then(() => true);
  }

  // templateId -> { app, canvas, template, clockTimer, videoMap }
  const active = new Map();

  // ── Clock formatting ──────────────────────────────────────────────────────

  function formatClockValue(layer) {
    const now = Math.floor(Date.now() / 1000);
    let total;
    if (layer.mode === 'clock') {
      const d = new Date();
      total = d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
    } else if (layer.mode === 'countup') {
      total = Math.max(0, now - (layer.startTime ?? now));
    } else {
      total = Math.max(0, (layer.targetTime ?? now) - now);
    }
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    return (layer.format || 'HH:mm:ss')
      .replace('HH', String(h).padStart(2, '0'))
      .replace('mm', String(m).padStart(2, '0'))
      .replace('ss', String(s).padStart(2, '0'));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function resolveValue(value, vars, fallback) {
    if (!value && value !== 0) return fallback;
    if (typeof value === 'string') return value;
    if (value && value.type === 'variable') return vars[value.variableId] ?? fallback;
    return fallback;
  }

  function hexColor(str) {
    if (!str || str === 'transparent') return 0x000000;
    return parseInt(str.replace('#', ''), 16);
  }

  // ── Video fit ─────────────────────────────────────────────────────────────

  function applyVideoFit(sprite, layer, entry) {
    const t = layer.transform;
    const fit = layer.fit || 'stretch';
    const vid = (entry.videoMap || new Map()).get(layer.id)?.el;
    const nw = vid ? vid.videoWidth : 0;
    const nh = vid ? vid.videoHeight : 0;
    const loaded = nw > 0 && nh > 0;

    if (!loaded || fit === 'stretch') {
      sprite.x = t.x; sprite.y = t.y;
      sprite.width = t.width; sprite.height = t.height;
      return;
    }

    const scale = fit === 'contain'
      ? Math.min(t.width / nw, t.height / nh)
      : Math.max(t.width / nw, t.height / nh);
    const sw = nw * scale, sh = nh * scale;
    sprite.x = t.x + (t.width - sw) / 2;
    sprite.y = t.y + (t.height - sh) / 2;
    sprite.width = sw; sprite.height = sh;
  }

  // ── Image fit ────────────────────────────────────────────────────────────

  function applyImageFit(sprite, layer, t) {
    const fit = layer.fit || 'stretch';
    const tex = sprite.texture;
    const loaded = tex && tex !== PIXI.Texture.EMPTY && tex.valid && tex.orig && tex.orig.width > 0;

    if (!loaded || fit === 'stretch') {
      sprite.x = t.x; sprite.y = t.y;
      sprite.width = t.width; sprite.height = t.height;
      return;
    }

    const nw = tex.orig.width, nh = tex.orig.height;
    const scale = fit === 'contain'
      ? Math.min(t.width / nw, t.height / nh)
      : Math.max(t.width / nw, t.height / nh);
    const sw = nw * scale, sh = nh * scale;
    sprite.x = t.x + (t.width - sw) / 2;
    sprite.y = t.y + (t.height - sh) / 2;
    sprite.width = sw; sprite.height = sh;
  }

  // ── Layer rendering ───────────────────────────────────────────────────────

  function createObj(layer) {
    switch (layer.type) {
      case 'text':
      case 'clock':  return new PIXI.Text('');
      case 'image':
      case 'video':  return new PIXI.Sprite();
      case 'rect':   return new PIXI.Graphics();
      default:       return new PIXI.Container();
    }
  }

  function applyLayer(obj, layer, vars, entry) {
    const t = layer.transform;
    obj.x = t.x;
    obj.y = t.y;
    obj.rotation = (t.rotation * Math.PI) / 180;
    obj.alpha = layer.visible ? layer.opacity : 0;

    const bmKey = (layer.blendMode || 'normal').toUpperCase();
    obj.blendMode = PIXI.BLEND_MODES[bmKey] ?? PIXI.BLEND_MODES.NORMAL;

    if (layer.type === 'text' || layer.type === 'clock') {
      const fill = resolveValue(layer.style.fill, vars, '#ffffff');
      obj.text = layer.type === 'clock'
        ? formatClockValue(layer)
        : resolveValue(layer.content, vars, '');
      obj.style = new PIXI.TextStyle({
        fontFamily:        layer.style.fontFamily || 'Arial',
        fontSize:          layer.style.fontSize   || 48,
        fontWeight:        layer.style.fontWeight || 'bold',
        fill,
        align:             layer.style.align,
        lineHeight:        layer.style.lineHeight,
        letterSpacing:     layer.style.letterSpacing,
        stroke:            layer.style.strokeColor,
        strokeThickness:   layer.style.strokeWidth,
        dropShadow:        layer.style.dropShadow,
        dropShadowBlur:    layer.style.dropShadowBlur,
        dropShadowColor:   layer.style.dropShadowColor,
        dropShadowDistance:layer.style.dropShadowDistance,
        wordWrap:          true,
        wordWrapWidth:     t.width,
      });
    }

    if (layer.type === 'rect') {
      const fill = resolveValue(layer.fill, vars, '#3a3a3a');
      obj.clear();
      if (layer.borderWidth > 0)
        obj.lineStyle(layer.borderWidth, hexColor(layer.borderColor), 1);
      obj.beginFill(hexColor(fill));
      if (layer.cornerRadius > 0)
        obj.drawRoundedRect(0, 0, t.width, t.height, layer.cornerRadius);
      else
        obj.drawRect(0, 0, t.width, t.height);
      obj.endFill();
    }

    if (layer.type === 'image') {
      const src = resolveValue(layer.src, vars, '');
      const cached = obj.texture && obj.texture.textureCacheIds && obj.texture.textureCacheIds[0];
      if (src && cached !== src) {
        PIXI.Texture.fromURL(src).then(tex => {
          obj.texture = tex;
          applyImageFit(obj, layer, t);
        }).catch(err => console.warn('Image load failed:', src, err));
      }
      applyImageFit(obj, layer, t);
    }

    if (layer.type === 'video' && entry) {
      const src = layer.src || '';
      if (src) {
        const existing = entry.videoMap.get(layer.id);
        if (!existing || existing.src !== src) {
          if (existing) { existing.el.pause(); existing.el.src = ''; }
          const el = document.createElement('video');
          el.src = src;
          el.loop = layer.loop !== false;
          el.muted = true;
          el.autoplay = true;
          el.playsInline = true;
          el.crossOrigin = 'anonymous';
          el.play().catch(() => {});
          entry.videoMap.set(layer.id, { el, src });
          obj.texture = PIXI.Texture.from(el);
        } else {
          existing.el.loop = layer.loop !== false;
        }
      } else {
        obj.texture = PIXI.Texture.EMPTY;
      }
      applyVideoFit(obj, layer, entry);
    }
  }

  // ── Template sync ─────────────────────────────────────────────────────────

  function syncTemplate(entry, vars) {
    ensureFonts(entry.template).then(loaded => { if (loaded) syncTemplate(entry, vars); });
    const { app, layerMap, template } = entry;
    const bg = template.canvas.background;
    if (!bg || bg === 'transparent') {
      app.renderer.background.alpha = 0;
    } else {
      app.renderer.background.color = hexColor(bg);
      app.renderer.background.alpha = 1;
    }

    const container = app.stage.children[0];
    const existingIds = new Set(layerMap.keys());
    const reversed = [...template.layers].reverse();

    reversed.forEach((layer, index) => {
      existingIds.delete(layer.id);
      let obj = layerMap.get(layer.id);
      if (!obj || obj.name !== layer.type) {
        if (obj) { container.removeChild(obj); obj.destroy(); }
        obj = createObj(layer);
        obj.name = layer.type;
        layerMap.set(layer.id, obj);
        container.addChildAt(obj, index);
      }
      applyLayer(obj, layer, vars || {}, entry);
      container.setChildIndex(obj, index);
    });

    existingIds.forEach(id => {
      const obj = layerMap.get(id);
      if (obj) { container.removeChild(obj); obj.destroy(); }
      layerMap.delete(id);
      const vid = entry.videoMap && entry.videoMap.get(id);
      if (vid) { vid.el.pause(); vid.el.src = ''; entry.videoMap.delete(id); }
    });
  }

  // ── Animations ────────────────────────────────────────────────────────────

  function playIn(entry, onComplete) {
    const { app, layerMap, template } = entry;
    const tl = gsap.timeline({ onComplete });
    (template.tracks || []).forEach(track => {
      const obj = layerMap.get(track.layerId);
      if (!obj || !track.inKeyframes.length) return;
      const fromState = { alpha: 0 };
      track.inKeyframes.forEach(kf => { if (kf.fromProperties) Object.assign(fromState, kf.fromProperties); });
      gsap.set(obj, fromState);
      track.inKeyframes.forEach(kf => {
        tl.to(obj, { duration: kf.time / 1000, ease: kf.easing, ...kf.properties }, 0);
      });
    });
    return tl;
  }

  function playOut(entry, onComplete) {
    const { app, layerMap, template } = entry;
    const tl = gsap.timeline({ onComplete });
    (template.tracks || []).forEach(track => {
      const obj = layerMap.get(track.layerId);
      if (!obj || !track.outKeyframes.length) return;
      track.outKeyframes.forEach(kf => {
        tl.to(obj, { duration: kf.time / 1000, ease: kf.easing, ...kf.properties }, 0);
      });
    });
    return tl;
  }

  // ── DOM Renderer (fallback when WebGL/Canvas unavailable) ────────────────

  // Map PIXI-style animation props to DOM/GSAP equivalents
  function mapGsapProps(props) {
    const out = {};
    for (const [k, v] of Object.entries(props)) {
      if (k === 'alpha') out.opacity = v;
      else out[k] = v;
    }
    return out;
  }

  function domApplyLayer(el, layer, vars) {
    const t = layer.transform;
    el.style.position     = 'absolute';
    el.style.left         = t.x + 'px';
    el.style.top          = t.y + 'px';
    el.style.width        = t.width + 'px';
    el.style.height       = t.height + 'px';
    el.style.opacity      = layer.visible ? (layer.opacity != null ? layer.opacity : 1) : 0;
    el.style.transform    = `rotate(${t.rotation || 0}deg)`;
    el.style.transformOrigin = '0 0';
    el.style.overflow     = 'hidden';
    el.style.boxSizing    = 'border-box';

    if (layer.type === 'text' || layer.type === 'clock') {
      const fill = resolveValue(layer.style.fill, vars, '#ffffff');
      const text = layer.type === 'clock'
        ? formatClockValue(layer)
        : resolveValue(layer.content, vars, '');
      el.textContent = text;
      const s = layer.style || {};
      el.style.color         = fill;
      el.style.fontFamily    = s.fontFamily || 'Arial';
      el.style.fontSize      = (s.fontSize || 48) + 'px';
      el.style.fontWeight    = s.fontWeight || 'bold';
      el.style.lineHeight    = s.lineHeight ? s.lineHeight + 'px' : 'normal';
      el.style.letterSpacing = s.letterSpacing ? s.letterSpacing + 'px' : 'normal';
      el.style.textAlign     = s.align || 'left';
      el.style.whiteSpace    = 'pre-wrap';
      el.style.wordBreak     = 'break-word';
      if (s.dropShadow) {
        const dist = s.dropShadowDistance || 2;
        el.style.textShadow = `${dist}px ${dist}px ${s.dropShadowBlur || 4}px ${s.dropShadowColor || 'rgba(0,0,0,0.8)'}`;
      } else {
        el.style.textShadow = '';
      }
      if (s.strokeWidth > 0) {
        el.style.webkitTextStroke = `${s.strokeWidth}px ${s.strokeColor || '#000'}`;
      } else {
        el.style.webkitTextStroke = '';
      }
    }

    if (layer.type === 'rect') {
      const fill = resolveValue(layer.fill, vars, '#3a3a3a');
      el.style.background   = fill === 'transparent' ? 'transparent' : fill;
      el.style.borderRadius = (layer.cornerRadius || 0) + 'px';
      if (layer.borderWidth > 0) {
        el.style.border = `${layer.borderWidth}px solid ${layer.borderColor || '#000000'}`;
      } else {
        el.style.border = 'none';
      }
    }

    if (layer.type === 'image') {
      const src = resolveValue(layer.src, vars, '');
      let img = el.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
        el.appendChild(img);
      }
      if (src && img.getAttribute('data-src') !== src) {
        img.setAttribute('data-src', src);
        img.src = src;
      }
      const fit = layer.fit || 'stretch';
      img.style.objectFit = fit === 'stretch' ? 'fill' : fit;
    }

    if (layer.type === 'video') {
      const src = layer.src || '';
      let vid = el.querySelector('video');
      if (!vid) {
        vid = document.createElement('video');
        vid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
        vid.muted = true; vid.autoplay = true; vid.playsInline = true;
        el.appendChild(vid);
      }
      const fit = layer.fit || 'stretch';
      vid.style.objectFit = fit === 'stretch' ? 'fill' : fit;
      if (src && vid.getAttribute('data-src') !== src) {
        vid.setAttribute('data-src', src);
        vid.src = src;
        vid.loop = layer.loop !== false;
        vid.play().catch(() => {});
      } else if (vid.getAttribute('data-src')) {
        vid.loop = layer.loop !== false;
      }
    }
  }

  function domSyncTemplate(entry, vars) {
    ensureFonts(entry.template).then(loaded => { if (loaded) domSyncTemplate(entry, vars); });
    const { domRoot, template, layerEls } = entry;
    const bg = template.canvas.background;
    domRoot.style.background = (!bg || bg === 'transparent') ? 'transparent' : bg;

    const existingIds = new Set(layerEls.keys());

    template.layers.forEach((layer, index) => {
      existingIds.delete(layer.id);
      let item = layerEls.get(layer.id);
      if (!item || item.type !== layer.type) {
        if (item) item.el.remove();
        const el = document.createElement('div');
        domRoot.appendChild(el);
        item = { el, type: layer.type };
        layerEls.set(layer.id, item);
      }
      item.el.style.zIndex = index;
      domApplyLayer(item.el, layer, vars || {});
    });

    existingIds.forEach(id => {
      const item = layerEls.get(id);
      if (item) item.el.remove();
      layerEls.delete(id);
    });
  }

  function domStartClockTicker(entry) {
    if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
    const clockLayers = (entry.template.layers || []).filter(l => l.type === 'clock');
    if (!clockLayers.length) return;
    entry.clockTimer = setInterval(() => {
      clockLayers.forEach(layer => {
        const item = entry.layerEls.get(layer.id);
        if (item) item.el.textContent = formatClockValue(layer);
      });
    }, 1000);
  }

  function domPlayIn(entry, onComplete) {
    const { layerEls, template } = entry;
    const tl = gsap.timeline({ onComplete });
    (template.tracks || []).forEach(track => {
      const item = layerEls.get(track.layerId);
      if (!item || !track.inKeyframes.length) return;
      const fromState = { opacity: 0 };
      track.inKeyframes.forEach(kf => {
        if (kf.fromProperties) Object.assign(fromState, mapGsapProps(kf.fromProperties));
      });
      gsap.set(item.el, fromState);
      track.inKeyframes.forEach(kf => {
        tl.to(item.el, { duration: kf.time / 1000, ease: kf.easing, ...mapGsapProps(kf.properties || {}) }, 0);
      });
    });
    return tl;
  }

  function domPlayOut(entry, onComplete) {
    const { layerEls, template } = entry;
    const tl = gsap.timeline({ onComplete });
    (template.tracks || []).forEach(track => {
      const item = layerEls.get(track.layerId);
      if (!item || !track.outKeyframes.length) return;
      track.outKeyframes.forEach(kf => {
        tl.to(item.el, { duration: kf.time / 1000, ease: kf.easing, ...mapGsapProps(kf.properties || {}) }, 0);
      });
    });
    if (tl.totalDuration() === 0 && onComplete) onComplete();
    return tl;
  }

  // ── Clock ticker ─────────────────────────────────────────────────────────

  function startClockTicker(entry) {
    if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
    const clockLayers = (entry.template.layers || []).filter(l => l.type === 'clock');
    if (!clockLayers.length) return;
    entry.clockTimer = setInterval(() => {
      clockLayers.forEach(layer => {
        const obj = entry.layerMap.get(layer.id);
        if (obj) obj.text = formatClockValue(layer);
      });
    }, 1000);
  }

  // ── Commands ──────────────────────────────────────────────────────────────

  function handleCommand(cmd) {
    window._dbg(`CMD: ${cmd.type} id=${cmd.templateId}`);
    if (cmd.type === 'take') {
      // Destroy existing if re-take
      const existing = active.get(cmd.templateId);
      if (existing) {
        if (existing.clockTimer) { clearInterval(existing.clockTimer); }
        if (existing.isDom) {
          existing.domRoot.remove();
        } else {
          if (existing.videoMap) { existing.videoMap.forEach(({ el }) => { el.pause(); el.src = ''; }); }
          try { existing.app.destroy(true); } catch(e) {}
          existing.canvas.remove();
        }
        active.delete(cmd.templateId);
      }

      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
      root.appendChild(canvas);

      let app;
      let useDom = false;
      try {
        app = new PIXI.Application({
          view: canvas,
          width:  cmd.template.canvas.width,
          height: cmd.template.canvas.height,
          backgroundAlpha: 0,
          resolution: 1,
          antialias: true,
        });
        window._dbg('PIXI init: WebGL OK');
      } catch (e) {
        window._dbg('PIXI WebGL failed, trying Canvas: ' + e.message);
        try {
          app = new PIXI.Application({
            view: canvas,
            width:  cmd.template.canvas.width,
            height: cmd.template.canvas.height,
            backgroundAlpha: 0,
            resolution: 1,
            forceCanvas: true,
          });
          window._dbg('PIXI init: Canvas OK');
        } catch (e2) {
          canvas.remove();
          window._dbg('PIXI FAILED, using DOM renderer: ' + e2.message);
          console.warn('PixiJS init failed, falling back to DOM renderer:', e2);
          useDom = true;
        }
      }

      if (useDom) {
        const domRoot = document.createElement('div');
        domRoot.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;';
        root.appendChild(domRoot);
        const entry = { isDom: true, domRoot, template: cmd.template, layerEls: new Map(), clockTimer: null };
        active.set(cmd.templateId, entry);
        updateHud();
        domSyncTemplate(entry, cmd.variables || {});
        domStartClockTicker(entry);
        domPlayIn(entry);
        window._dbg(`TAKE done (DOM): ${cmd.template.name}, layers=${cmd.template.layers.length}`);
        return;
      }

      const layerContainer = new PIXI.Container();
      app.stage.addChild(layerContainer);

      const entry = { app, canvas, template: cmd.template, layerMap: new Map(), clockTimer: null, videoMap: new Map() };
      active.set(cmd.templateId, entry);
      updateHud();

      syncTemplate(entry, cmd.variables || {});
      startClockTicker(entry);
      playIn(entry);
      window._dbg(`TAKE done: ${cmd.template.name}, layers=${cmd.template.layers.length}`);
    }

    if (cmd.type === 'clear') {
      const entry = active.get(cmd.templateId);
      if (!entry) return;
      if (entry.clockTimer) { clearInterval(entry.clockTimer); entry.clockTimer = null; }
      active.delete(cmd.templateId);
      updateHud();

      if (entry.isDom) {
        domPlayOut(entry, () => { entry.domRoot.remove(); });
        return;
      }

      // PIXI path — pause videos now, clean up after out-anim
      if (entry.videoMap) entry.videoMap.forEach(({ el }) => { try { el.pause(); } catch(e) {} });
      playOut(entry, () => {
        if (entry.videoMap) {
          entry.videoMap.forEach(({ el }) => {
            try { el.removeAttribute('src'); el.load(); } catch(e) {}
          });
          entry.videoMap.clear();
        }
        try { entry.app.destroy(true); } catch(e) { console.warn('PIXI destroy:', e); }
        entry.canvas.remove();
      });
    }

    if (cmd.type === 'update') {
      const entry = active.get(cmd.templateId);
      if (!entry) return;
      if (entry.isDom) {
        domSyncTemplate(entry, cmd.variables || {});
        return;
      }
      syncTemplate(entry, cmd.variables || {});
    }
  }

  // ── HUD ───────────────────────────────────────────────────────────────────

  function updateHud() {
    const n = active.size;
    airBadge.style.display = n > 0 ? '' : 'none';
    airBadge.textContent = n + ' ON AIR';
  }

  // ── Debug overlay (add ?debug to URL to enable) ───────────────────────────

  const IS_DEBUG = new URLSearchParams(location.search).has('debug');
  let debugEl = null;
  if (IS_DEBUG) {
    debugEl = document.createElement('div');
    debugEl.style.cssText = 'position:fixed;bottom:8px;left:8px;right:8px;z-index:9999;font-family:monospace;font-size:11px;color:#0f0;text-shadow:0 0 4px #000;pointer-events:none;';
    document.body.appendChild(debugEl);
    const lines = [];
    window._dbg = (msg) => {
      const t = new Date().toISOString().slice(11,23);
      lines.unshift(`[${t}] ${msg}`);
      if (lines.length > 12) lines.pop();
      debugEl.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
    };
    window.onerror = (msg, src, line) => window._dbg(`ERROR: ${msg} (${line})`);
    window._dbg('Debug mode ON — waiting for commands...');
  } else {
    window._dbg = () => {};
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = new URLSearchParams(location.search).get('host') || location.host;
    const url = `${protocol}//${host}/ws/renderer`;
    wsBadge.title = url;
    const ws = new WebSocket(url);

    ws.onopen = () => {
      wsBadge.style.background = '#16a34a';
      wsBadge.textContent = '⬤ WS';
      window._dbg('WS connected: ' + url);
    };
    ws.onclose = () => {
      wsBadge.style.background = '#dc2626';
      wsBadge.textContent = '✕ WS';
      window._dbg('WS disconnected, retry in 3s');
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      try { handleCommand(JSON.parse(e.data)); } catch(err) { console.error(err); }
    };
  }

  const IS_PREVIEW = new URLSearchParams(location.search).has('preview');
  if (IS_PREVIEW) {
    document.getElementById('hud').style.display = 'none';
    document.body.style.background = '#0a0a0f';
  } else {
    connect();
  }

  // PostMessage for preview mode (or external control without WS)
  window.addEventListener('message', (e) => {
    if (e.data && typeof e.data === 'object' && e.data.type) {
      try { handleCommand(e.data); } catch (err) { console.error(err); }
    }
  });
  </script>
</body>
</html>
